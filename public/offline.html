<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#059669" />
    <title>Lexi - Offline</title>
    <style>
      :root { color-scheme: light; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
        background: #ffffff;
        color: #0f172a;
      }
      .wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 520px;
        border: 1px solid rgba(15, 23, 42, 0.12);
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(5, 150, 105, 0.08), rgba(255,255,255,1));
        padding: 24px;
        box-shadow: 0 10px 30px rgba(2, 6, 23, 0.06);
      }
      .top {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-bottom: 12px;
      }
      .icon {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        background: rgba(5, 150, 105, 0.12);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
      }
      h1 {
        margin: 0;
        font-size: 24px;
        letter-spacing: -0.02em;
      }
      p { margin: 8px 0 0 0; line-height: 1.5; color: rgba(15,23,42,0.8); }
      .btnRow { margin-top: 18px; display: flex; gap: 10px; flex-wrap: wrap; }
      button {
        appearance: none;
        border: none;
        border-radius: 12px;
        padding: 11px 14px;
        font-weight: 700;
        cursor: pointer;
      }
      .primary {
        background: #059669;
        color: #ffffff;
      }
      .secondary {
        background: rgba(15, 23, 42, 0.06);
        color: #0f172a;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card" role="alert" aria-live="polite">
        <div class="top">
          <div class="icon">📡</div>
          <div>
            <h1>You're offline</h1>
            <p style="margin: 0;">Some features require an internet connection. Please reconnect and try again.</p>
          </div>
        </div>
        <div class="btnRow">
          <button class="primary" onclick="location.reload()">Retry</button>
          <button class="secondary" onclick="history.back()">Go back</button>
        </div>
      </div>
    </div>
  </body>
</html>
